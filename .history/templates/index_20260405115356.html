<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CellarEcho - AI Sommelier</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary-blue: #0b57d0; --bg-main: #ffffff; --sidebar-bg: #f0f4f9; --text-main: #1f1f1f; --text-sub: #444746; --border: #c4c7c5; --error: #b3261e; }
        body { font-family: 'Google Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); max-width: 1000px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; height: 95vh; overflow: hidden; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--bg-main); padding: 40px; border-radius: 28px; border: 1px solid var(--border); text-align: center; width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .login-card input { width: 100%; border: 1px solid var(--border); padding: 14px; border-radius: 24px; margin-bottom: 16px; box-sizing: border-box; font-size: 1rem; }
        .login-btn { background: var(--primary-blue); color: white; width: 100%; padding: 14px; border-radius: 24px; border: none; font-weight: 500; cursor: pointer; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--sidebar-bg); padding-bottom: 10px; }
        #chat-container { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 24px; line-height: 1.6; padding: 12px 20px; border-radius: 24px; max-width: 85%; font-size: 1.05rem; }
        .user-msg { background: var(--sidebar-bg); color: var(--text-main); margin-left: auto; }
        .ai-msg { background: transparent; margin-right: auto; padding-left: 0; }
        .msg b { display: block; margin-bottom: 4px; font-size: 0.8em; letter-spacing: 0.5px; }
        .ai-msg b { color: var(--primary-blue); }
        .thinking-container { display: flex; align-items: center; padding: 10px; color: #888; }
        .breathing-dot { width: 8px; height: 8px; background-color: #4285f4; border-radius: 50%; margin-right: 5px; animation: breathing 1.5s ease-in-out infinite; }
        .dot-2 { animation-delay: 0.2s; }
        .dot-3 { animation-delay: 0.4s; }
        @keyframes breathing { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.3); opacity: 1; } }
        .input-area { display: flex; gap: 10px; background: var(--sidebar-bg); padding: 10px 20px; border-radius: 32px; align-items: center; }
        #user-input { flex: 1; background: transparent; border: none; outline: none; font-size: 1rem; color: var(--text-main); }
        table { border-collapse: collapse; width: 100%; margin: 15px 0; font-size: 0.9em; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        th { background-color: var(--sidebar-bg); font-weight: 600; }
    </style>
</head>
<body>
    <div id="login-overlay"><div class="login-card"><h2>🍷 CellarEcho</h2><p id="login-sub">登录以开启酒窖对话</p><input type="text" id="login-user" placeholder="用户名"><div style="position: relative;"><input type="password" id="login-pass" placeholder="密码"><span onclick="togglePassword()" style="position:absolute; right:18px; top:14px; cursor:pointer; color:var(--primary-blue);">👁️</span></div><button onclick="handleLogin()" id="login-btn-text" class="login-btn">登录</button><button onclick="toggleLang()" id="login-lang-btn" style="background:none; border:none; color:var(--primary-blue); cursor:pointer; margin-top:15px; text-decoration:underline;">English</button><p id="login-err-msg" style="color:var(--error); display:none; margin-top:10px;"></p></div></div>
    <div class="header"><h1>CellarEcho</h1><div class="controls"><input type="text" id="user-id-display" readonly style="width:80px; background:var(--sidebar-bg); border:none; color:var(--text-sub); border-radius:12px; text-align:center; font-size:0.75rem; padding:4px;"><button id="sync-btn" onclick="syncCellar()">🔄 同步</button><button onclick="location.reload()" id="logout-btn">登出</button><button onclick="toggleLang()" id="lang-btn">EN</button></div></div>
    <div id="chat-container"><div class="msg ai-msg" id="welcome-msg"><b>AI</b><span>你好。我是您的 AI 侍酒师。</span></div></div>
    <div class="input-area" style="margin-top:10px;"><input type="text" id="user-input" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter') sendMessage()"><button onclick="sendMessage()" id="send-btn" style="background:var(--primary-blue); color:white; border:none; padding:8px 18px; border-radius:20px; cursor:pointer;">发送</button></div>
<script>
    const i18n = {
        zh: { welcome: "你好。我是您的 AI 侍酒师。今天想喝哪瓶藏酒？", sync: "🔄 同步", syncing: "⌛ 同步中...", searching: "🔍 正在搜索互联网...", thinking: "CellarEcho 正在思考...", sync_ok: "✅ 同步成功！已加载 {count} 瓶藏酒。", user_label: "您", ai_label: "AI" },
        en: { welcome: "Hello. I'm your AI Sommelier. Which bottle shall we open today?", sync: "🔄 Sync", syncing: "⌛ Syncing...", searching: "🔍 Searching the internet...", thinking: "CellarEcho is thinking...", sync_ok: "✅ Sync successful! Loaded {count} bottles.", user_label: "You", ai_label: "AI" }
    };
    let currentLang = localStorage.getItem('vino_lang') || 'zh';
    let currentUserId = "Guest"; let global_ct_pass = "";

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('sync-btn').innerText = t.sync;
        document.getElementById('lang-btn').innerText = currentLang === 'zh' ? "EN" : "中文";
        if(document.getElementById('chat-container').children.length <= 1) {
            document.getElementById('welcome-msg').innerHTML = `<b>${t.ai_label}</b><span>${t.welcome}</span>`;
        }
    }

    function appendMessage(role, text) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `msg ${role}-msg`;
        const label = role === 'user' ? i18n[currentLang].user_label : i18n[currentLang].ai_label;
        div.innerHTML = `<b>${label}</b><span>${marked.parse(text)}</span>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function handleLogin() {
        const user = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;
        const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:user, password:pass}) });
        if (res.ok) {
            const data = await res.json();
            currentUserId = data.user_id; global_ct_pass = pass;
            document.getElementById('user-id-display').value = currentUserId;
            document.getElementById('login-overlay').style.display = 'none';
            updateUI(); syncCellar();
        }
    }

    async function syncCellar() {
        const btn = document.getElementById('sync-btn');
        btn.innerText = i18n[currentLang].syncing;
        const res = await fetch('/update_cellar', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({user_id: currentUserId, ct_pass: global_ct_pass}) });
        if (res.ok) {
            const data = await res.json();
            btn.innerText = "✅ " + i18n[currentLang].sync.replace('🔄', '');
            appendMessage('assistant', i18n[currentLang].sync_ok.replace('{count}', data.count));
        }
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const message = input.value.trim();
        if (!message) return;
        appendMessage('user', message);
        input.value = '';

        const loadingId = 'loading-' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.id = loadingId;
        loadingDiv.className = 'msg ai-msg';
        loadingDiv.innerHTML = `<b>${i18n[currentLang].ai_label}</b><div class="thinking-container"><div class="breathing-dot"></div><div class="breathing-dot dot-2"></div><div class="breathing-dot dot-3"></div><span id="status-text">${i18n[currentLang].thinking}</span></div>`;
        container.appendChild(loadingDiv);
        container.scrollTop = container.scrollHeight;

        const response = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: message, user_id: currentUserId, lang: currentLang }) });
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let isFirstChunk = true; let fullText = ""; let aiContentSpan = null;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });

            // 🔍 捕获搜索信号
            if (chunk.includes("__SEARCHING_START__")) {
                document.getElementById('status-text').innerText = i18n[currentLang].searching;
                continue;
            }

            if (isFirstChunk && chunk.trim().length > 0) {
                loadingDiv.remove();
                const finalAiDiv = document.createElement('div');
                finalAiDiv.className = 'msg ai-msg';
                finalAiDiv.innerHTML = `<b>${i18n[currentLang].ai_label}</b><span></span>`;
                container.appendChild(finalAiDiv);
                aiContentSpan = finalAiDiv.querySelector('span');
                isFirstChunk = false;
            }
            if (aiContentSpan) {
                fullText += chunk;
                aiContentSpan.innerHTML = marked.parse(fullText);
                container.scrollTop = container.scrollHeight;
            }
        }
    }
    updateUI();
</script>
</body>
</html>
