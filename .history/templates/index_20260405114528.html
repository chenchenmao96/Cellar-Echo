<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CellarEcho - AI Sommelier</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* --- 1. 保留你原本的 Gemini Light 配色 --- */
        :root {
            --primary-blue: #0b57d0;
            --bg-main: #ffffff;
            --sidebar-bg: #f0f4f9;
            --text-main: #1f1f1f;
            --text-sub: #444746;
            --border: #c4c7c5;
            --error: #b3261e;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
            overflow: hidden;
        }

        /* --- 2. 登录遮罩层 --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }

        .login-card {
            background: var(--bg-main);
            padding: 40px; border-radius: 28px;
            border: 1px solid var(--border);
            text-align: center; width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .login-card input {
            width: 100%; border: 1px solid var(--border);
            padding: 14px; border-radius: 24px; margin-bottom: 16px;
            box-sizing: border-box; font-size: 1rem;
        }

        .login-btn {
            background: var(--primary-blue); color: white;
            width: 100%; padding: 14px; border-radius: 24px;
            border: none; font-weight: 500; cursor: pointer;
        }

        /* --- 3. 聊天气泡样式 --- */
        #chat-container { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 24px; line-height: 1.6; padding: 12px 20px; border-radius: 24px; max-width: 85%; font-size: 1.05rem; }
        .user-msg { background: var(--sidebar-bg); color: var(--text-main); margin-left: auto; }
        .ai-msg { background: transparent; margin-right: auto; padding-left: 0; }
        .msg b { display: block; margin-bottom: 4px; font-size: 0.8em; }
        .ai-msg b { color: var(--primary-blue); }

        /* --- 4. 呼吸灯动画 --- */
        .thinking-container { display: flex; align-items: center; padding: 10px; color: #888; }
        .breathing-dot {
            width: 8px; height: 8px; background-color: #4285f4;
            border-radius: 50%; margin-right: 5px;
            animation: breathing 1.5s ease-in-out infinite;
        }
        .dot-2 { animation-delay: 0.2s; }
        .dot-3 { animation-delay: 0.4s; }
        @keyframes breathing {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* --- 5. 输入区 --- */
        .input-area {
            display: flex; gap: 10px; background: var(--sidebar-bg);
            padding: 10px 20px; border-radius: 32px; align-items: center;
        }
        #user-input { flex: 1; background: transparent; border: none; outline: none; font-size: 1rem; }

        /* 表格美化 */
        table { border-collapse: collapse; width: 100%; margin: 15px 0; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        th { background-color: var(--sidebar-bg); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 id="login-title">🍷 CellarEcho</h2>
            <p id="login-sub">登录以开启酒窖对话</p>
            <input type="text" id="login-user" placeholder="用户名">
            <div style="position: relative;">
                <input type="password" id="login-pass" placeholder="密码">
                <span onclick="togglePassword()" style="position:absolute; right:18px; top:14px; cursor:pointer; color:var(--primary-blue);">👁️</span>
            </div>
            <button onclick="handleLogin()" id="login-btn-text" class="login-btn">登录</button>
            <button onclick="toggleLang()" id="login-lang-btn" style="background:none; border:none; color:var(--primary-blue); cursor:pointer; margin-top:15px; text-decoration:underline;">English</button>
            <p id="login-err-msg" style="color:var(--error); display:none; margin-top:10px;"></p>
        </div>
    </div>

    <div class="header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h1 id="ui-title" style="color:var(--primary-blue); font-size:1.4rem;">CellarEcho</h1>
        <div class="controls">
            <span id="display-user-id" style="font-size:0.8rem; color:var(--text-sub);"></span>
            <button id="sync-btn" onclick="syncCellar()" style="border:1px solid var(--primary-blue); color:var(--primary-blue); border-radius:12px; padding:4px 10px; cursor:pointer; background:none;">🔄 同步</button>
            <button onclick="location.reload()" id="logout-btn" style="border:none; background:none; color:var(--text-sub); cursor:pointer;">登出</button>
            <button onclick="toggleLang()" id="lang-btn" style="border:none; background:none; color:var(--primary-blue); cursor:pointer; font-weight:bold;">EN</button>
        </div>
    </div>

    <div id="chat-container">
        <div class="msg ai-msg" id="welcome-msg"><b>AI</b><span>你好。我是您的 AI 侍酒师。</span></div>
    </div>

    <div class="input-area" style="margin-top:10px;">
        <input type="text" id="user-input" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" id="send-btn" style="background:var(--primary-blue); color:white; border:none; padding:8px 18px; border-radius:20px; cursor:pointer;">发送</button>
    </div>

<script>
    const i18n = {
        zh: { title: "CellarEcho", welcome: "你好。我是您的 AI 侍酒师。今天想喝哪瓶藏酒？", sync: "🔄 同步", syncing: "⌛ 同步中...", lang_label: "English", placeholder: "问问 AI 今晚喝哪瓶...", logout: "登出", send: "发送", login_title: "🍷 CellarEcho", login_sub: "登录以开启酒窖对话", login_user: "用户名", login_pass: "密码", login_btn: "登录", login_err: "账号或密码错误", ai_label: "AI", user_label: "您" },
        en: { title: "CellarEcho", welcome: "Hello. I'm your AI Sommelier. Which bottle shall we open today?", sync: "🔄 Sync", syncing: "⌛ Syncing...", lang_label: "中文", placeholder: "Ask AI about your wine...", logout: "Logout", send: "Send", login_title: "🍷 CellarEcho", login_sub: "Login to chat with your cellar", login_user: "Username", login_pass: "Password", login_btn: "Login", login_err: "Incorrect credentials", ai_label: "AI", user_label: "You" }
    };

    let currentLang = localStorage.getItem('vino_lang') || 'zh';
    let currentUserId = "Guest";
    let global_ct_pass = "";

    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('ui-title').innerText = t.title;
        document.getElementById('sync-btn').innerText = t.sync;
        document.getElementById('user-input').placeholder = t.placeholder;
        document.getElementById('lang-btn').innerText = currentLang === 'zh' ? "EN" : "中文";
        document.getElementById('logout-btn').innerText = t.logout;
        document.getElementById('send-btn').innerText = t.send;
        document.getElementById('login-title').innerText = t.login_title;
        document.getElementById('login-sub').innerText = t.login_sub;
        document.getElementById('login-user').placeholder = t.login_user;
        document.getElementById('login-pass').placeholder = t.login_pass;
        document.getElementById('login-btn-text').innerText = t.login_btn;
        document.getElementById('login-lang-btn').innerText = t.lang_label;
        if(document.getElementById('chat-container').children.length <= 1) {
            document.getElementById('welcome-msg').innerHTML = `<b>${t.ai_label}</b><span>${t.welcome}</span>`;
        }
    }

    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('vino_lang', currentLang);
        updateUI();
    }

    function togglePassword() {
        const p = document.getElementById('login-pass');
        p.type = p.type === 'password' ? 'text' : 'password';
    }

    async function handleLogin() {
        const user = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;
        const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:user, password:pass}) });
        const data = await res.json();
        if (res.ok) {
            currentUserId = data.user_id;
            global_ct_pass = pass;
            document.getElementById('display-user-id').innerText = currentUserId;
            document.getElementById('login-overlay').style.display = 'none';
            updateUI();
            syncCellar();
        } else {
            const err = document.getElementById('login-err-msg');
            err.style.display = 'block';
            err.innerText = i18n[currentLang].login_err;
        }
    }

    async function syncCellar() {
        const btn = document.getElementById('sync-btn');
        btn.innerText = i18n[currentLang].syncing;
        const res = await fetch('/update_cellar', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({user_id: currentUserId, ct_pass: global_ct_pass}) });
        if (res.ok) btn.innerText = "✅ " + i18n[currentLang].sync.replace('🔄', '');
        else btn.innerText = "❌";
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const message = input.value.trim();
        if (!message) return;

        // 1. 用户消息
        const uLabel = i18n[currentLang].user_label;
        const userDiv = document.createElement('div');
        userDiv.className = 'msg user-msg';
        userDiv.innerHTML = `<b>${uLabel}</b><span>${message}</span>`;
        container.appendChild(userDiv);
        input.value = '';
        container.scrollTop = container.scrollHeight;

        // 2. 插入呼吸灯占位符
        const loadingId = 'loading-' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.id = loadingId;
        loadingDiv.className = 'msg ai-msg';
        loadingDiv.innerHTML = `
            <b>${i18n[currentLang].ai_label}</b>
            <div class="thinking-container">
                <div class="breathing-dot"></div>
                <div class="breathing-dot dot-2"></div>
                <div class="breathing-dot dot-3"></div>
                <span style="font-size:0.9em; margin-left:10px;">${currentLang === 'zh' ? 'CellarEcho 正在思考...' : 'CellarEcho is thinking...'}</span>
            </div>`;
        container.appendChild(loadingDiv);
        container.scrollTop = container.scrollHeight;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, user_id: currentUserId, lang: currentLang })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let isFirstChunk = true;
            let fullText = "";
            let aiContentSpan = null;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value, { stream: true });

                if (isFirstChunk && chunk.trim().length > 0) {
                    loadingDiv.remove();
                    const finalAiDiv = document.createElement('div');
                    finalAiDiv.className = 'msg ai-msg';
                    finalAiDiv.innerHTML = `<b>${i18n[currentLang].ai_label}</b><span></span>`;
                    container.appendChild(finalAiDiv);
                    aiContentSpan = finalAiDiv.querySelector('span');
                    isFirstChunk = false;
                }

                if (aiContentSpan) {
                    fullText += chunk;
                    aiContentSpan.innerHTML = marked.parse(fullText);
                    container.scrollTop = container.scrollHeight;
                }
            }
        } catch (e) {
            console.error(e);
        }
    }

    updateUI();
</script>
</body>
</html>
