<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CellarEcho - AI Sommelier</title>
  <style>
    /* --- 1. Gemini 核心配色变量 --- */
    :root {
        --burgundy: #8ab4f8;        /* Gemini 蓝 - 主色调 */
        --gold: #c678dd;            /* 柔和紫 - 用户点缀色 */
        --dark-bg: #131314;         /* 深灰背景 */
        --chat-bg: #1e1f20;         /* 消息框背景 */
        --text: #e3e3e3;            /* 柔和白色文字 */
        --border: #444746;          /* Gemini 风格边框色 */
    }

    /* --- 2. 基础布局 --- */
    body {
        font-family: 'Google Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--dark-bg);
        color: var(--text);
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        height: 95vh;
        transition: all 0.3s ease;
    }

    /* --- 3. 顶部控制栏 (Header) --- */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 15px;
        margin-bottom: 15px;
        border-bottom: 1px solid var(--border);
    }

    #ui-title {
        font-size: 1.5rem;
        font-weight: 500;
        letter-spacing: -0.5px;
    }

    .controls {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    /* --- 4. 按钮与输入框 (Gemini 胶囊风格) --- */
    input[type="text"]#user-id {
        background: transparent;
        border: 1px solid var(--border);
        color: #999;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85em;
        text-align: center;
    }

    button {
        cursor: pointer;
        padding: 8px 20px;
        border: 1px solid var(--border);
        border-radius: 20px; /* 胶囊圆角 */
        transition: background 0.2s, transform 0.1s;
        font-weight: 500;
        background: transparent;
        color: var(--text);
    }

    button:hover {
        background: rgba(255, 255, 255, 0.05);
    }

    button:active {
        transform: scale(0.98);
    }

    #sync-btn {
        color: var(--burgundy);
        border-color: var(--burgundy);
    }

    #sync-btn:hover {
        background: rgba(138, 180, 248, 0.1);
    }

    #sync-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* --- 5. 聊天对话区 --- */
    #chat-container {
        flex: 1;
        background: var(--dark-bg);
        border-radius: 12px;
        padding: 10px;
        overflow-y: auto;
        margin-bottom: 20px;
        display: flex;
        flex-direction: column;
    }

    .msg {
        margin-bottom: 24px;
        line-height: 1.6;
        padding: 12px 18px;
        border-radius: 22px; /* 大圆角 */
        max-width: 85%;
        font-size: 1rem;
        position: relative;
    }

    /* 用户消息：带边框的深色块 */
    .user-msg {
        background: var(--chat-bg);
        border: 1px solid var(--border);
        margin-left: auto;
        color: var(--text);
        border-bottom-right-radius: 4px; /* 气泡尖角效果 */
    }

    /* AI 消息：无背景，纯文字流式感 */
    .ai-msg {
        background: transparent;
        margin-right: auto;
        padding-left: 0;
        color: var(--text);
    }

    .msg b {
        display: block;
        margin-bottom: 4px;
        font-size: 0.85em;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .user-msg b { color: var(--gold); }
    .ai-msg b { color: var(--burgundy); }

    /* --- 6. 底部输入区域 --- */
    .input-area {
        display: flex;
        gap: 12px;
        background: var(--chat-bg);
        padding: 8px 16px;
        border-radius: 32px; /* 极大的圆角，模拟 Gemini 搜索栏 */
        border: 1px solid var(--border);
        align-items: center;
    }

    #user-input {
        flex: 1;
        padding: 10px 4px;
        background: transparent;
        border: none;
        color: white;
        outline: none;
        font-size: 1rem;
    }

    #send-btn {
        background-color: var(--burgundy);
        color: #131314;
        border: none;
        width: auto;
        padding: 8px 24px;
    }

    #send-btn:hover {
        background-color: #aecbfa;
    }

    /* --- 7. 手机版适配 (Mobile Responsive) --- */
    @media (max-width: 600px) {
        body {
            padding: 10px;
            height: 98vh;
        }

        .header {
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            padding-bottom: 20px;
        }

        .controls {
            width: 100%;
            justify-content: flex-start;
            flex-wrap: wrap;
        }

        button {
            padding: 6px 14px;
            font-size: 0.9em;
        }

        #chat-container {
            padding: 5px;
        }

        .msg {
            max-width: 92%;
            font-size: 0.95rem;
            margin-bottom: 18px;
        }

        .input-area {
            margin-bottom: 10px;
        }
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* --- 登录遮罩层升级 --- */
#login-overlay {
    background: rgba(19, 19, 20, 0.85) !important; /* 更深邃的半透明 */
    backdrop-filter: blur(12px); /* 👈 核心：毛玻璃效果，极具高级感 */
}

.login-card {
    background: var(--chat-bg);
    padding: 48px 40px;
    border-radius: 28px; /* 更大的圆角 */
    border: 1px solid var(--border);
    text-align: center;
    width: 380px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

.login-card h2 {
    color: var(--text);
    font-weight: 500;
    margin-bottom: 8px;
}

.login-card p {
    color: #999;
    margin-bottom: 32px;
}

/* 登录输入框：改为胶囊型 */
.login-card input {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: white;
    padding: 14px 20px;
    border-radius: 24px;
    margin-bottom: 16px;
    box-sizing: border-box;
    font-size: 1rem;
    transition: border-color 0.3s;
}

.login-card input:focus {
    border-color: var(--burgundy); /* 获取焦点时变蓝色 */
    outline: none;
}

/* 登录按钮：科技感蓝色 */
.login-btn {
    background: var(--burgundy) !important;
    color: #131314 !important;
    width: 100%;
    padding: 14px !important;
    font-size: 1rem !important;
    margin-top: 10px;
    border: none !important;
}

.login-btn:hover {
    background: #aecbfa !important;
}
</style>
</head>

<body>
<div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div class="login-card">
        <h2 id="login-title">🍷 CellarEcho</h2>
        <p id="login-sub">请使用 CellarTracker 账号验证</p>
        
        <input type="text" id="login-user" placeholder="CT 用户名">
        
        <div style="position: relative; width: 100%;">
            <input type="password" id="login-pass" placeholder="CT 密码">
            <span id="toggle-pass" onclick="togglePassword()" style="position: absolute; right: 20px; top: 12px; cursor: pointer; color: var(--burgundy); font-size: 1.2em;">
                👁️
            </span>
        </div>
        
        <button onclick="handleLogin()" class="login-btn">登录</button>
        
        <div style="margin-top: 25px;">
            <button onclick="toggleLang()" style="background:transparent; color:var(--burgundy); border:none; text-decoration:underline; font-size:0.9em; cursor:pointer;" id="login-lang-btn">English</button>
        </div>
        
        <p id="login-err-msg" style="color:#ff4d4d; font-size:0.85em; margin-top:15px; display:none;"></p>
    </div>
</div>
    <div class="header">
        <h1 id="ui-title">🍷 CellarEcho</h1>
    <div class="controls">
        <input type="text" id="user-id" value="" title="User ID" readonly style="background:#222; color:#888;">
        <button id="sync-btn" onclick="syncCellar()">🔄 同步酒窖</button>
        <button id="logout-btn" onclick="handleLogout()" style="background-color: #444; color: white;">登出</button>
        <button id="lang-btn" onclick="toggleLang()">English</button>
    </div>
    </div>

    <div id="chat-container">
        <div class="msg ai-msg" id="welcome-msg">
            你好，陈陈。我是你的 AI 侍酒师。今天想喝哪瓶藏酒？
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>

<script>
    // --- 1. 全局变量：必须在最前面定义 ---
    let currentLang = localStorage.getItem('vino_lang') || 'zh';
    let global_ct_pass = ""; 
    let currentUserId = "Guest"; // 👈 解决 ReferenceError: currentUserId 的关键

    // --- 2. 新增：Markdown 解析函数 ---
    // 解决 ReferenceError: formatMarkdown 的关键
    function formatMarkdown(text) {
        if (!text) return "";
        return text
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>') // 处理加粗，比如 **Lafite**
            .replace(/\n/g, '<br>');               // 处理换行
    }

    const i18n = {
        zh: {
            title: "🍷 CellarEcho 侍酒师",
            logout: "登出",
            sync: "🔄 同步酒窖",
            syncing: "⌛ 同步中...",
            welcome: "你好，陈陈。我是你的 AI 侍酒师。今天想喝哪瓶藏酒？",
            placeholder: "问问 AI 今晚喝哪瓶...",
            send: "发送",
            lang_label: "English",
            login_title: "🍷 CellarEcho 登录",
            login_sub: "请使用 CellarTracker 账号验证",
            user_placeholder: "CT 用户名",
            pass_placeholder: "CT 密码",
            login_err: "CT 账号或密码错误"
        },
        en: {
            title: "🍷 CellarEcho Sommelier",
            logout: "Logout",
            sync: "🔄 Sync Cellar",
            syncing: "⌛ Syncing...",
            welcome: "Hello. I'm your AI Sommelier. Which bottle shall we open today?",
            placeholder: "Ask AI which bottle to drink...",
            send: "Send",
            lang_label: "中文",
            login_title: "🍷 CellarEcho Login",
            login_sub: "Verify with CellarTracker Account",
            user_placeholder: "CT Username",
            pass_placeholder: "CT Password",
            login_err: "Incorrect username or password"
        }
    };

    // --- 3. 登录逻辑：更新 currentUserId ---
    async function handleLogin() {
        const user = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;
        const errEl = document.getElementById('login-err-msg');
        if (!user || !pass) return;

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await response.json();

            if (response.ok) {
                // 👈 登录成功时，一定要把 ID 存进全局变量
                currentUserId = data.user_id; 
                global_ct_pass = pass; 
                document.getElementById('user-id').value = currentUserId;
                document.getElementById('login-overlay').style.display = 'none';
                updateUI();
                syncCellar(); 
            } else {
                errEl.innerText = i18n[currentLang].login_err;
                errEl.style.display = 'block';
            }
        } catch (e) {
            errEl.innerText = "Connection failed.";
            errEl.style.display = 'block';
        }
    }

    // --- 4. 聊天逻辑：使用 reader 逐字读取 ---
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const message = input.value;
        if (!message) return;

        appendMessage('user', message);
        input.value = '';

        const aiMessageDiv = appendMessage('assistant', ''); 
        const contentSpan = aiMessageDiv.querySelector('.content-text'); 
        
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: message,
                    user_id: currentUserId, // 👈 现在这里不会报错了
                    lang: currentLang 
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value, { stream: true });
                fullText += chunk;
                
                // 👈 调用刚定义的解析函数
                contentSpan.innerHTML = formatMarkdown(fullText); 
                container.scrollTop = container.scrollHeight;
            }
        } catch (error) {
            contentSpan.innerText = "抱歉，出错了: " + error;
        }
    }

    // --- 其他辅助函数 (保持不变) ---
    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('ui-title').innerText = t.title;
        document.getElementById('sync-btn').innerText = t.sync;
        document.getElementById('user-input').placeholder = t.placeholder;
        document.getElementById('send-btn').innerText = t.send;
        document.getElementById('lang-btn').innerText = t.lang_label;
        document.getElementById('logout-btn').innerText = t.logout;
        if(document.getElementById('chat-container').children.length === 1) {
            document.getElementById('welcome-msg').innerText = t.welcome;
        }
    }
    function toggleLang() { currentLang = currentLang === 'zh' ? 'en' : 'zh'; localStorage.setItem('vino_lang', currentLang); updateUI(); }
    function togglePassword() { const p = document.getElementById('login-pass'); p.type = p.type === 'password' ? 'text' : 'password'; }
    function handleLogout() { location.reload(); }
    function appendMessage(role, text) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `msg ${role}-msg`;
        const label = role === 'user' ? (currentLang === 'zh' ? '你' : 'You') : 'CellarEcho';
        div.innerHTML = `<b>${label}:</b><br><span class="content-text">${text}</span>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }
    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
    async function syncCellar() { /* ... 保持你之前的 sync 逻辑即可 ... */ }

    updateUI();
</script>
</body>
</html>
