<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CellarEcho - AI Sommelier</title>
    <style>
        :root {
            --burgundy: #800020;
            --gold: #D4AF37;
            --dark-bg: #1a1a1a;
            --chat-bg: #252525;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        /* 顶部控制栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--burgundy);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"] {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
        }

        button {
            cursor: pointer;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            transition: all 0.3s;
            font-weight: bold;
        }

        #sync-btn { background-color: var(--burgundy); color: white; }
        #sync-btn:hover { background-color: #a00028; }
        #sync-btn:disabled { background-color: #444; cursor: not-allowed; }

        #lang-btn { background-color: #444; color: white; }

        /* 聊天区域 */
        #chat-container {
            flex: 1;
            background: var(--chat-bg);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .msg { margin-bottom: 15px; line-height: 1.5; padding: 10px; border-radius: 6px; max-width: 85%; }
        .user-msg { background: #3a3a3a; margin-left: auto; border-right: 4px solid var(--gold); }
        .ai-msg { background: #2d2d2d; margin-right: auto; border-left: 4px solid var(--burgundy); }

        /* 输入区域 */
        .input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px;
            background: #333;
            border: 1px solid var(--burgundy);
            color: white;
            border-radius: 4px;
        }

        #send-btn { background-color: var(--gold); color: black; width: 100px; }
        #send-btn:hover { background-color: #f1c40f; }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: var(--burgundy); border-radius: 10px; }
    </style>
</head>
<div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--chat-bg); padding:40px; border-radius:8px; border:1px solid var(--burgundy); text-align:center; width:350px;">
        <h2 style="color:var(--gold);">🍷 CellarEcho 登录</h2>
        <p style="font-size:0.9em; color:#888;">请使用 CellarTracker 账号登录</p>
        <input type="text" id="login-user" placeholder="CT 用户名" style="width:100%; margin-bottom:15px; padding:10px;">
        <input type="password" id="login-pass" placeholder="CT 密码" style="width:100%; margin-bottom:20px; padding:10px;">
        <button id="login-btn" onclick="handleLogin()" style="background:var(--burgundy); color:white; width:100%; padding:12px;">进入地窖</button>
        <p id="login-err" style="color:red; margin-top:15px; display:none;"></p>
    </div>
</div>
<body>

    <div class="header">
        <h1 id="ui-title">🍷 CellarEcho</h1>
        <div class="controls">
            <input type="text" id="user-id" value="Chenchen" title="User ID">
            <button id="sync-btn" onclick="syncCellar()">🔄 同步酒窖</button>
            <button id="lang-btn" onclick="toggleLang()">English</button>
        </div>
    </div>

    <div id="chat-container">
        <div class="msg ai-msg" id="welcome-msg">
            你好，陈陈。我是你的 AI 侍酒师。今天想喝哪瓶藏酒？
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        // --- 多语言配置 ---
        const i18n = {
            zh: {
                title: "🍷 CellarEcho 侍酒师",
                sync: "🔄 同步酒窖",
                syncing: "⌛ 同步中...",
                sync_ok: "同步成功！已载入 {n} 瓶酒。",
                sync_err: "同步失败，请检查后端日志。",
                placeholder: "问问 AI 今晚喝哪瓶...",
                send: "发送",
                welcome: "你好。我是你的 AI 侍酒师。今天想喝哪瓶藏酒？",
                lang_label: "English"
            },
            en: {
                title: "🍷 CellarEcho Sommelier",
                sync: "🔄 Sync Cellar",
                syncing: "⌛ Syncing...",
                sync_ok: "Success! Loaded {n} bottles.",
                sync_err: "Sync failed. Check logs.",
                placeholder: "Ask AI which bottle to drink...",
                send: "Send",
                welcome: "Hello. I'm your AI Sommelier. Which bottle shall we open today?",
                lang_label: "中文"
            }
        };

        let currentLang = localStorage.getItem('vino_lang') || 'zh';

        // --- 初始化界面 ---
        function updateUI() {
            const t = i18n[currentLang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('sync-btn').innerText = t.sync;
            document.getElementById('user-input').placeholder = t.placeholder;
            document.getElementById('send-btn').innerText = t.send;
            document.getElementById('lang-btn').innerText = t.lang_label;
            // 只有初始状态才更新欢迎语
            if(document.getElementById('chat-container').children.length === 1) {
                document.getElementById('welcome-msg').innerText = t.welcome;
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('vino_lang', currentLang);
            updateUI();
        }

        // --- 核心功能：同步酒窖 ---
        async function syncCellar() {
            const btn = document.getElementById('sync-btn');
            const userId = document.getElementById('user-id').value;
            const t = i18n[currentLang];

            btn.disabled = true;
            btn.innerText = t.syncing;

            try {
                const response = await fetch('/update_cellar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert(t.sync_ok.replace('{n}', data.count));
                } else {
                    alert(t.sync_err);
                }
            } catch (error) {
                alert(t.sync_err);
            } finally {
                btn.disabled = false;
                btn.innerText = t.sync;
            }
        }

        // --- 核心功能：聊天对话 ---
// --- 核心功能：聊天对话 (流式版本) ---
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const userId = document.getElementById('user-id').value;
            const message = input.value.trim();

            if (!message) return;

            // 1. 用户消息上屏
            appendMessage('user', message);
            input.value = '';

            // 2. 预先创建一个空的 AI 回复框，准备填入内容
            const aiBubble = appendMessage('ai', ""); 
            const aiContentArea = aiBubble.querySelector('.content-text');

            try {
                // 3. 发送到后端
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message, 
                        user_id: userId,
                        lang: currentLang 
                    })
                });

                // 4. 【流式处理核心】读取二进制流
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullReply = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break; // 读取完成
                    
                    // 解码并替换换行符
                    const chunk = decoder.decode(value, { stream: true });
                    fullReply += chunk;
                    
                    // 实时更新前端 UI
                    aiContentArea.innerHTML = fullReply.replace(/\n/g, '<br>');
                    container.scrollTop = container.scrollHeight; // 自动滚屏
                }
            } catch (error) {
                aiContentArea.innerText = "Error: 侍酒师暂时离开了地窖。";
            }
        }

        // --- 修改后的 appendMessage (支持返回引用) ---
        function appendMessage(role, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `msg ${role}-msg`;
            
            // 我们把名字和内容分开，方便后续追加内容
            const label = role === 'user' ? (currentLang === 'zh' ? '你' : 'You') : 'CellarEcho';
            div.innerHTML = `<b>${label}:</b><br><span class="content-text">${text.replace(/\n/g, '<br>')}</span>`;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div; // 返回这个 div 引用，方便 sendMessage 追加文字
        }
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // 启动执行
        updateUI();
    </script>
</body>
</html>
