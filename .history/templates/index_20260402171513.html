<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CellarEcho - AI Sommelier</title>
    <style>
        :root {
            --burgundy: #800020;
            --gold: #D4AF37;
            --dark-bg: #1a1a1a;
            --chat-bg: #252525;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        /* 顶部控制栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--burgundy);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"] {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
        }

        button {
            cursor: pointer;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            transition: all 0.3s;
            font-weight: bold;
        }

        #sync-btn { background-color: var(--burgundy); color: white; }
        #sync-btn:hover { background-color: #a00028; }
        #sync-btn:disabled { background-color: #444; cursor: not-allowed; }

        #lang-btn { background-color: #444; color: white; }

        /* 聊天区域 */
        #chat-container {
            flex: 1;
            background: var(--chat-bg);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .msg { margin-bottom: 15px; line-height: 1.5; padding: 10px; border-radius: 6px; max-width: 85%; }
        .user-msg { background: #3a3a3a; margin-left: auto; border-right: 4px solid var(--gold); }
        .ai-msg { background: #2d2d2d; margin-right: auto; border-left: 4px solid var(--burgundy); }

        /* 输入区域 */
        .input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px;
            background: #333;
            border: 1px solid var(--burgundy);
            color: white;
            border-radius: 4px;
        }

        #send-btn { background-color: var(--gold); color: black; width: 100px; }
        #send-btn:hover { background-color: #f1c40f; }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: var(--burgundy); border-radius: 10px; }
    </style>
</head>

<body>
<div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(26,26,26,0.95); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--chat-bg); padding:40px; border-radius:12px; border:1px solid var(--burgundy); text-align:center; width:360px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h2 id="login-title" style="color:var(--gold); margin-bottom:10px;">🍷 CellarEcho 登录</h2>
        <p id="login-sub" style="font-size:0.85em; color:#888; margin-bottom:25px;">请使用 CellarTracker 账号验证</p>
        
        <input type="text" id="login-user" placeholder="CT 用户名" style="width:100%; margin-bottom:15px; padding:12px; box-sizing:border-box;">
        
        <div style="position: relative; width: 100%;">
            <input type="password" id="login-pass" placeholder="CT 密码" style="width:100%; margin-bottom:20px; padding:12px; box-sizing:border-box;">
            <span id="toggle-pass" onclick="togglePassword()" style="position: absolute; right: 12px; top: 10px; cursor: pointer; color: var(--gold); font-size: 1.2em; user-select: none;">
                👁️
            </span>
        </div>
        
        <button onclick="handleLogin()" style="background:var(--burgundy); color:white; width:100%; padding:14px; margin-bottom:15px; font-size:1em;">登录</button>
        
        <button onclick="toggleLang()" style="background:transparent; color:var(--gold); border:none; text-decoration:underline; font-size:0.9em; cursor:pointer;" id="login-lang-btn">English</button>
        
        <p id="login-err-msg" style="color:#ff4d4d; font-size:0.85em; margin-top:15px; display:none;"></p>
    </div>
</div>
    <div class="header">
        <h1 id="ui-title">🍷 CellarEcho</h1>
    <div class="controls">
        <input type="text" id="user-id" value="" title="User ID" readonly style="background:#222; color:#888;">
        <button id="sync-btn" onclick="syncCellar()">🔄 同步酒窖</button>
        <button id="logout-btn" onclick="handleLogout()" style="background-color: #444; color: white;">登出</button>
        <button id="lang-btn" onclick="toggleLang()">English</button>
    </div>
    </div>

    <div id="chat-container">
        <div class="msg ai-msg" id="welcome-msg">
            你好，陈陈。我是你的 AI 侍酒师。今天想喝哪瓶藏酒？
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>

<script>
    // --- 1. 全局变量与配置 ---
    const i18n = {
        zh: {
            title: "🍷 CellarEcho 侍酒师",
            logout: "登出",
            sync: "🔄 同步酒窖",
            syncing: "⌛ 同步中...",
            sync_ok: "同步成功！已载入 {n} 瓶酒。",
            sync_err: "同步失败，请检查后端日志。",
            placeholder: "问问 AI 今晚喝哪瓶...",
            send: "发送",
            welcome: "你好。我是你的 AI 侍酒师。今天想喝哪瓶藏酒？",
            lang_label: "English",
            // 登录界面中文
            login_title: "🍷 CellarEcho 登录",
            login_sub: "请使用 CellarTracker 账号验证",
            user_placeholder: "CT 用户名",
            pass_placeholder: "CT 密码",
            login_err: "CT 账号或密码错误"
        },
        en: {
            title: "🍷 CellarEcho Sommelier",
            logout: "Logout",
            sync: "🔄 Sync Cellar",
            syncing: "⌛ Syncing...",
            sync_ok: "Success! Loaded {n} bottles.",
            sync_err: "Sync failed. Check logs.",
            placeholder: "Ask AI which bottle to drink...",
            send: "Send",
            welcome: "Hello. I'm your AI Sommelier. Which bottle shall we open today?",
            lang_label: "中文",
            // 登录界面英文
            login_title: "🍷 CellarEcho Login",
            login_sub: "Verify with CellarTracker Account",
            user_placeholder: "CT Username",
            pass_placeholder: "CT Password",
            login_err: "Incorrect username or password"
        }
    };

    let currentLang = localStorage.getItem('vino_lang') || 'zh';
    // index.html 脚本开头部分

let global_ct_pass = ""; 
let currentUserId = "Guest"; // 👈 新增：全局存储当前用户 ID
    // --- 2. 界面更新逻辑 ---
    function updateUI() {
        const t = i18n[currentLang];
        
        // 更新主界面
        document.getElementById('ui-title').innerText = t.title;
        document.getElementById('sync-btn').innerText = t.sync;
        document.getElementById('user-input').placeholder = t.placeholder;
        document.getElementById('send-btn').innerText = t.send;
        document.getElementById('lang-btn').innerText = t.lang_label;
        document.getElementById('logout-btn').innerText = t.logout;
        // 更新登录界面 (如果它还在的话)
        const loginTitle = document.getElementById('login-title');
        if (loginTitle) {
            loginTitle.innerText = t.login_title;
            document.getElementById('login-sub').innerText = t.login_sub;
            document.getElementById('login-user').placeholder = t.user_placeholder;
            document.getElementById('login-pass').placeholder = t.pass_placeholder;
            document.getElementById('login-lang-btn').innerText = t.lang_label;
        }

        if(document.getElementById('chat-container').children.length === 1) {
            document.getElementById('welcome-msg').innerText = t.welcome;
        }
    }

    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('vino_lang', currentLang);
        updateUI();
    }
    function togglePassword() {
    const passInput = document.getElementById('login-pass');
    const toggleBtn = document.getElementById('toggle-pass');
    
    if (passInput.type === "password") {
        passInput.type = "text";
        toggleBtn.innerText = "🙈"; // 隐藏状态图标
    } else {
        passInput.type = "password";
        toggleBtn.innerText = "👁️"; // 显示状态图标
    }
}
    function handleLogout() {
    // 1. 确认操作 (可选)
    const t = i18n[currentLang];
    if (!confirm(currentLang === 'zh' ? "确定要离开地窖吗？" : "Are you sure you want to logout?")) return;

    // 2. 清空核心变量
    global_ct_pass = ""; 
    document.getElementById('user-id').value = "";
    
    // 3. 清空聊天记录（保护隐私）
    const container = document.getElementById('chat-container');
    container.innerHTML = `<div class="msg ai-msg" id="welcome-msg">${i18n[currentLang].welcome}</div>`;

    // 4. 重新显示登录遮罩层
    const overlay = document.getElementById('login-overlay');
    overlay.style.display = 'flex';
    
    // 5. 重置登录框输入
    document.getElementById('login-user').value = "";
    document.getElementById('login-pass').value = "";
    document.getElementById('login-err-msg').style.display = 'none';

    console.log("✅ CellarEcho 已安全登出");
}
    // --- 3. 登录处理逻辑 ---
    async function handleLogin() {
    const user = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-err-msg');
    const t = i18n[currentLang];

    if (!user || !pass) return;

    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        });
        const data = await response.json();

        if (response.ok) {
            // 1. 登录成功：记录 ID 和密码
            document.getElementById('user-id').value = data.user_id;
            currentUserId = data.user_id; // 👈 关键：同步更新全局变量
            global_ct_pass = pass; 
            
            // 2. 隐藏遮罩层并更新 UI
            document.getElementById('login-overlay').style.display = 'none';
            updateUI();

            // 3. 🚀 关键：登录成功后立即触发自动同步
            syncCellar(); 

        } else {
            errEl.innerText = t.login_err;
            errEl.style.display = 'block';
        }
    } catch (e) {
        errEl.innerText = "Connection failed.";
        errEl.style.display = 'block';
    }
}
    // --- 4. 同步功能 (使用登录密码) ---
    async function syncCellar() {
        const btn = document.getElementById('sync-btn');
        const userId = document.getElementById('user-id').value;
        const t = i18n[currentLang];

        btn.disabled = true;
        btn.innerText = t.syncing;

        try {
            const response = await fetch('/update_cellar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user_id: userId, 
                    password: global_ct_pass // 👈 使用登录时存下的密码
                })
            });
            const data = await response.json();
           if (data.status === 'success') {
            // 👈 移除 alert，改为按钮反馈
            btn.innerText = "✅ " + (currentLang === 'zh' ? '同步成功' : 'Success');
            setTimeout(() => {
                btn.innerText = t.sync;
                btn.disabled = false;
            }, 3000); 
        } else {
            btn.innerText = "❌ " + (currentLang === 'zh' ? '失败' : 'Failed');
            btn.disabled = false;
        }
    } catch (error) {
        btn.innerText = "❌ Error";
        btn.disabled = false;
    }
}
    // --- 5. 聊天对话 (流式) ---
   // index.html 里的发送逻辑修正
async function sendMessage() {
    const input = document.getElementById('user-input');
    const message = input.value;
    if (!message) return;

    // 先在 UI 上显示用户的问题
    appendMessage('user', message);
    input.value = '';

    // 创建一个空的回复框
    const aiMessageDiv = appendMessage('assistant', ''); 
    
    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                message: message,
                user_id: currentUserId, // 👈 确保 user_id 正确
                lang: currentLang 
            })
        });

        // 🚀 关键：使用 ReadableStream 读取数据
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = "";

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            // 将二进制流转为文字
            const chunk = decoder.decode(value, { stream: true });
            fullText += chunk;
            
            // 实时更新 UI
            aiMessageDiv.innerHTML = formatMarkdown(fullText); 
            // 自动滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

    } catch (error) {
        aiMessageDiv.innerText = "抱歉，出错了: " + error;
    }
}

    function appendMessage(role, text) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `msg ${role}-msg`;
        const label = role === 'user' ? (currentLang === 'zh' ? '你' : 'You') : 'CellarEcho';
        div.innerHTML = `<b>${label}:</b><br><span class="content-text">${text.replace(/\n/g, '<br>')}</span>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    // 启动初始化
    updateUI();
</script>
</body>
</html>
