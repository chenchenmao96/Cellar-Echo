<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CellarEcho - AI Sommelier</title>
    <style>
        :root {
            --burgundy: #800020;
            --gold: #D4AF37;
            --dark-bg: #1a1a1a;
            --chat-bg: #252525;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        /* 顶部控制栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--burgundy);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"] {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
        }

        button {
            cursor: pointer;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            transition: all 0.3s;
            font-weight: bold;
        }

        #sync-btn { background-color: var(--burgundy); color: white; }
        #sync-btn:hover { background-color: #a00028; }
        #sync-btn:disabled { background-color: #444; cursor: not-allowed; }

        #lang-btn { background-color: #444; color: white; }

        /* 聊天区域 */
        #chat-container {
            flex: 1;
            background: var(--chat-bg);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .msg { margin-bottom: 15px; line-height: 1.5; padding: 10px; border-radius: 6px; max-width: 85%; }
        .user-msg { background: #3a3a3a; margin-left: auto; border-right: 4px solid var(--gold); }
        .ai-msg { background: #2d2d2d; margin-right: auto; border-left: 4px solid var(--burgundy); }

        /* 输入区域 */
        .input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px;
            background: #333;
            border: 1px solid var(--burgundy);
            color: white;
            border-radius: 4px;
        }

        #send-btn { background-color: var(--gold); color: black; width: 100px; }
        #send-btn:hover { background-color: #f1c40f; }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: var(--burgundy); border-radius: 10px; }
    </style>
</head>

<body>
<div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(26,26,26,0.95); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--chat-bg); padding:40px; border-radius:12px; border:1px solid var(--burgundy); text-align:center; width:360px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h2 id="login-title" style="color:var(--gold); margin-bottom:10px;">🍷 CellarEcho 登录</h2>
        <p id="login-sub" style="font-size:0.85em; color:#888; margin-bottom:25px;">请使用 CellarTracker 账号验证</p>
        
        <input type="text" id="login-user" placeholder="CT 用户名" style="width:100%; margin-bottom:15px; padding:12px; box-sizing:border-box;">
        
        <div style="position: relative; width: 100%;">
            <input type="password" id="login-pass" placeholder="CT 密码" style="width:100%; margin-bottom:20px; padding:12px; box-sizing:border-box;">
            <span id="toggle-pass" onclick="togglePassword()" style="position: absolute; right: 12px; top: 10px; cursor: pointer; color: var(--gold); font-size: 1.2em; user-select: none;">
                👁️
            </span>
        </div>
        
        <button onclick="handleLogin()" style="background:var(--burgundy); color:white; width:100%; padding:14px; margin-bottom:15px; font-size:1em;">登录</button>
        
        <button onclick="toggleLang()" style="background:transparent; color:var(--gold); border:none; text-decoration:underline; font-size:0.9em; cursor:pointer;" id="login-lang-btn">English</button>
        
        <p id="login-err-msg" style="color:#ff4d4d; font-size:0.85em; margin-top:15px; display:none;"></p>
    </div>
</div>
    <div class="header">
        <h1 id="ui-title">🍷 CellarEcho</h1>
    <div class="controls">
        <input type="text" id="user-id" value="" title="User ID" readonly style="background:#222; color:#888;">
        <button id="sync-btn" onclick="syncCellar()">🔄 同步酒窖</button>
        <button id="logout-btn" onclick="handleLogout()" style="background-color: #444; color: white;">登出</button>
        <button id="lang-btn" onclick="toggleLang()">English</button>
    </div>
    </div>

    <div id="chat-container">
        <div class="msg ai-msg" id="welcome-msg">
            你好，陈陈。我是你的 AI 侍酒师。今天想喝哪瓶藏酒？
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>

<script>
    // --- 1. 全局变量：必须在最前面定义 ---
    let currentLang = localStorage.getItem('vino_lang') || 'zh';
    let global_ct_pass = ""; 
    let currentUserId = "Guest"; // 👈 解决 ReferenceError: currentUserId 的关键

    // --- 2. 新增：Markdown 解析函数 ---
    // 解决 ReferenceError: formatMarkdown 的关键
    function formatMarkdown(text) {
        if (!text) return "";
        return text
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>') // 处理加粗，比如 **Lafite**
            .replace(/\n/g, '<br>');               // 处理换行
    }

    const i18n = {
        zh: {
            title: "🍷 CellarEcho 侍酒师",
            logout: "登出",
            sync: "🔄 同步酒窖",
            syncing: "⌛ 同步中...",
            welcome: "你好，陈陈。我是你的 AI 侍酒师。今天想喝哪瓶藏酒？",
            placeholder: "问问 AI 今晚喝哪瓶...",
            send: "发送",
            lang_label: "English",
            login_title: "🍷 CellarEcho 登录",
            login_sub: "请使用 CellarTracker 账号验证",
            user_placeholder: "CT 用户名",
            pass_placeholder: "CT 密码",
            login_err: "CT 账号或密码错误"
        },
        en: {
            title: "🍷 CellarEcho Sommelier",
            logout: "Logout",
            sync: "🔄 Sync Cellar",
            syncing: "⌛ Syncing...",
            welcome: "Hello. I'm your AI Sommelier. Which bottle shall we open today?",
            placeholder: "Ask AI which bottle to drink...",
            send: "Send",
            lang_label: "中文",
            login_title: "🍷 CellarEcho Login",
            login_sub: "Verify with CellarTracker Account",
            user_placeholder: "CT Username",
            pass_placeholder: "CT Password",
            login_err: "Incorrect username or password"
        }
    };

    // --- 3. 登录逻辑：更新 currentUserId ---
    async function handleLogin() {
        const user = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;
        const errEl = document.getElementById('login-err-msg');
        if (!user || !pass) return;

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await response.json();

            if (response.ok) {
                // 👈 登录成功时，一定要把 ID 存进全局变量
                currentUserId = data.user_id; 
                global_ct_pass = pass; 
                document.getElementById('user-id').value = currentUserId;
                document.getElementById('login-overlay').style.display = 'none';
                updateUI();
                syncCellar(); 
            } else {
                errEl.innerText = i18n[currentLang].login_err;
                errEl.style.display = 'block';
            }
        } catch (e) {
            errEl.innerText = "Connection failed.";
            errEl.style.display = 'block';
        }
    }

    // --- 4. 聊天逻辑：使用 reader 逐字读取 ---
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const message = input.value;
        if (!message) return;

        appendMessage('user', message);
        input.value = '';

        const aiMessageDiv = appendMessage('assistant', ''); 
        const contentSpan = aiMessageDiv.querySelector('.content-text'); 
        
        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: message,
                    user_id: currentUserId, // 👈 现在这里不会报错了
                    lang: currentLang 
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value, { stream: true });
                fullText += chunk;
                
                // 👈 调用刚定义的解析函数
                contentSpan.innerHTML = formatMarkdown(fullText); 
                container.scrollTop = container.scrollHeight;
            }
        } catch (error) {
            contentSpan.innerText = "抱歉，出错了: " + error;
        }
    }

    // --- 其他辅助函数 (保持不变) ---
    function updateUI() {
        const t = i18n[currentLang];
        document.getElementById('ui-title').innerText = t.title;
        document.getElementById('sync-btn').innerText = t.sync;
        document.getElementById('user-input').placeholder = t.placeholder;
        document.getElementById('send-btn').innerText = t.send;
        document.getElementById('lang-btn').innerText = t.lang_label;
        document.getElementById('logout-btn').innerText = t.logout;
        if(document.getElementById('chat-container').children.length === 1) {
            document.getElementById('welcome-msg').innerText = t.welcome;
        }
    }
    function toggleLang() { currentLang = currentLang === 'zh' ? 'en' : 'zh'; localStorage.setItem('vino_lang', currentLang); updateUI(); }
    function togglePassword() { const p = document.getElementById('login-pass'); p.type = p.type === 'password' ? 'text' : 'password'; }
    function handleLogout() { location.reload(); }
    function appendMessage(role, text) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `msg ${role}-msg`;
        const label = role === 'user' ? (currentLang === 'zh' ? '你' : 'You') : 'CellarEcho';
        div.innerHTML = `<b>${label}:</b><br><span class="content-text">${text}</span>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }
    function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }
    async function syncCellar() { /* ... 保持你之前的 sync 逻辑即可 ... */ }

    updateUI();
</script>
</body>
</html>
