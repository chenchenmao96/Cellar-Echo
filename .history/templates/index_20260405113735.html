<!DOCTYPE html>
<html lang="zh">
<head >
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CellarEcho - AI Sommelier</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* --- 1. Gemini Light 核心配色变量 --- */
        :root {
            --primary-blue: #0b57d0;    /* Gemini 经典蓝 */
            --bg-main: #ffffff;         /* 纯白背景 */
            --sidebar-bg: #f0f4f9;      /* 浅灰蓝背景（用于输入框和气泡） */
            --text-main: #1f1f1f;       /* 近黑色文字 */
            --text-sub: #444746;        /* 次要灰色文字 */
            --border: #c4c7c5;          /* 柔和边框色 */
            --error: #b3261e;           /* 错误红 */
        }

        body {
            font-family: 'Google Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* --- 2. 登录遮罩层 (Gemini Light 风格) --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }

        .login-card {
            background: var(--bg-main);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid var(--border);
            text-align: center;
            width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .login-card input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 18px;
            border-radius: 24px;
            margin-bottom: 16px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .login-card input:focus { border-color: var(--primary-blue); outline: none; }

        .login-btn {
            background: var(--primary-blue);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 24px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            font-size: 1rem;
        }

        /* --- 3. 主界面布局 --- */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 12px; margin-bottom: 15px;
            border-bottom: 1px solid var(--sidebar-bg);
        }

        #ui-title { font-size: 1.4rem; font-weight: 500; color: var(--primary-blue); }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 10px;
            display: flex; flex-direction: column;
        }

        .msg {
            margin-bottom: 24px; line-height: 1.6; padding: 12px 20px;
            border-radius: 24px; max-width: 85%;
            font-size: 1.05rem;
        }

        /* 用户消息：浅灰色背景气泡 */
        .user-msg { background: var(--sidebar-bg); color: var(--text-main); margin-left: auto; }
        
        /* AI 消息：透明背景，纯文字，带蓝色标识 */
        .ai-msg { background: transparent; margin-right: auto; padding-left: 0; }

        .msg b { display: block; margin-bottom: 4px; font-size: 0.8em; letter-spacing: 0.5px; }
        .user-msg b { color: var(--text-sub); }
        .ai-msg b { color: var(--primary-blue); }

        /* --- 4. 底部输入框 --- */
        .input-area-wrapper { padding: 10px 0 20px 0; }
        .input-area {
            display: flex; gap: 10px; background: var(--sidebar-bg);
            padding: 10px 20px; border-radius: 32px; align-items: center;
            transition: box-shadow 0.2s;
        }
        .input-area:focus-within { box-shadow: 0 1px 6px rgba(32,33,36,0.2); background: white; border: 1px solid var(--border); }

        #user-input { flex: 1; background: transparent; border: none; color: var(--text-main); outline: none; font-size: 1rem; }

        /* --- 5. 手机版适配 --- */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .header { flex-direction: column; gap: 10px; align-items: flex-start; }
            .controls { width: 100%; display: flex; justify-content: space-between; }
            .msg { max-width: 92%; font-size: 1rem; }
            .login-card { width: 88%; padding: 30px 20px; }
        }

        button.icon-btn {
            background: transparent; border: none; color: var(--text-sub);
            cursor: pointer; padding: 8px; border-radius: 50%;
        }
        button.icon-btn:hover { background: var(--sidebar-bg); }

        /* --- index.html 的 <style> 标签内，末尾处插入 --- */

/* 8. Markdown 渲染美化 (配合 marked.js) */
#chat-container table { 
    border-collapse: collapse; 
    width: 100%; 
    margin: 15px 0; 
    font-size: 0.9em;
    background: var(--bg-main); /* 确保表格在白底模式下清晰 */
}

#chat-container th, #chat-container td { 
    border: 1px solid var(--border); 
    padding: 10px; 
    text-align: left; 
}

#chat-container th {
    background-color: var(--sidebar-bg); /* 表头使用浅灰色区分 */
    font-weight: 600;
}

#chat-container blockquote { 
    border-left: 4px solid var(--primary-blue); /* 引用框左侧蓝条 */
    padding: 2px 15px; 
    color: var(--text-sub); 
    margin: 15px 0;
    background: var(--sidebar-bg);
    border-radius: 4px;
}

#chat-container ul, #chat-container ol {
    padding-left: 25px;
    margin: 10px 0;
}
/* 在 index.html 的 <style> 中添加 */
.thinking-dots {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: #888;
}

.thinking-dots span {
  width: 6px;
  height: 6px;
  background-color: currentColor;
  border-radius: 50%;
  animation: breathe 1.4s infinite both;
}

.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes breathe {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.1); }
}
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 id="login-title">🍷 CellarEcho</h2>
            <p id="login-sub">登录以开启酒窖对话</p>
            <input type="text" id="login-user" placeholder="用户名">
            <div style="position: relative;">
                <input type="password" id="login-pass" placeholder="密码">
                <span onclick="togglePassword()" style="position:absolute; right:18px; top:14px; cursor:pointer; color:var(--primary-blue);">👁️</span>
            </div>
            <button onclick="handleLogin()" class="login-btn">登录</button>
            <div style="margin-top:24px;">
                <button id="login-lang-btn" onclick="toggleLang()" style="background:transparent; color:var(--primary-blue); border:none; text-decoration:underline; cursor:pointer; font-size:0.9rem;">English</button>
            </div>
            <p id="login-err-msg" style="color:var(--error); font-size:0.85rem; margin-top:15px; display:none;"></p>
        </div>
    </div>

    <div class="header">
        <h1 id="ui-title">CellarEcho</h1>
        <div class="controls">
            <input type="text" id="user-id" readonly style="width:70px; background:var(--sidebar-bg); border:none; color:var(--text-sub); border-radius:12px; text-align:center; font-size:0.75rem; padding:4px;">
            <button id="sync-btn" onclick="syncCellar()" style="color:var(--primary-blue); border-color:var(--primary-blue); font-size:0.85rem;">🔄 同步</button>
            <button id="logout-btn" onclick="location.reload()" style="font-size:0.85rem;">登出</button>
            <button id="lang-btn" onclick="toggleLang()" style="font-size:0.85rem;">EN</button>
        </div>
    </div>

    <div id="chat-container">
        <div class="msg ai-msg" id="welcome-msg">你好，陈陈。我是您的 AI 侍酒师。</div>
    </div>

    <div class="input-area-wrapper">
        <div class="input-area">
            <input type="text" id="user-input" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()" style="background:var(--primary-blue); color:white; border:none; padding:8px 18px; border-radius:20px; font-weight:500;">发送</button>
        </div>
    </div>

<script>
    // --- 1. 全局配置 ---
    const i18n = {
    zh: { 
        title: "CellarEcho", 
        welcome: "你好。我是您的 AI 侍酒师。今天想喝哪瓶藏酒？", 
        sync: "🔄 同步", 
        syncing: "⌛ 同步中...", 
        lang_label: "English", 
        placeholder: "问问 AI 今晚喝哪瓶...", 
        logout: "登出",
        send: "发送",
        login_title: "🍷 CellarEcho",
        login_sub: "登录以开启酒窖对话",
        login_user: "用户名",
        login_pass: "密码",
        login_btn: "登录",
        login_err: "账号或密码错误" 
    },
    en: { 
        title: "CellarEcho", 
        welcome: "Hello. I'm your AI Sommelier. Which bottle shall we open today?", 
        sync: "🔄 Sync", 
        syncing: "⌛ Syncing...", 
        lang_label: "中文", 
        placeholder: "Ask AI about your wine...", 
        logout: "Logout",
        send: "Send",
        login_title: "🍷 CellarEcho",
        login_sub: "Login to chat with your cellar",
        login_user: "Username",
        login_pass: "Password",
        login_btn: "Login",
        login_err: "Incorrect credentials" 
    }
};
    let currentLang = localStorage.getItem('vino_lang') || 'zh';
    let currentUserId = "Guest"; // 👈 默认值，防止 ReferenceError
    let global_ct_pass = "";

    // --- 2. 界面更新函数 ---
    function updateUI() {
    const t = i18n[currentLang];
    
    // 1. 更新主界面文字
    document.getElementById('ui-title').innerText = t.title;
    document.getElementById('sync-btn').innerText = t.sync;
    document.getElementById('user-input').placeholder = t.placeholder;
    document.getElementById('lang-btn').innerText = currentLang === 'zh' ? "EN" : "中文";
    
    // 2. 更新“登出”和“发送”按钮
    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) logoutBtn.innerText = t.logout;
    
    const sendBtn = document.getElementById('send-btn');
    if (sendBtn) sendBtn.innerText = t.send;

    // 3. 👈 核心修复：更新登录界面的所有组件
    const loginTitle = document.getElementById('login-title');
    if (loginTitle) loginTitle.innerText = t.login_title;

    const loginSub = document.getElementById('login-sub');
    if (loginSub) loginSub.innerText = t.login_sub;

    const loginUser = document.getElementById('login-user');
    if (loginUser) loginUser.placeholder = t.login_user;

    const loginPass = document.getElementById('login-pass');
    if (loginPass) loginPass.placeholder = t.login_pass;

    const loginBtn = document.querySelector('.login-btn'); // 👈 注意类名选择器
    if (loginBtn) loginBtn.innerText = t.login_btn;

    // 4. 更新语言切换按钮（显示目标语言）
    const loginLangBtn = document.getElementById('login-lang-btn');
    if (loginLangBtn) loginLangBtn.innerText = t.lang_label;

    // 5. 更新欢迎语
    if(document.getElementById('chat-container').children.length <= 1) {
        document.getElementById('welcome-msg').innerText = t.welcome;
    }
}

    function formatMarkdown(text) {
    if (!text) return "";
    try {
        // 使用你已经在 <head> 中引入的 marked.js 库
        return marked.parse(text); 
    } catch (e) {
        console.error("Markdown 解析出错:", e);
        return text; // 如果解析失败，至少返回原文本，防止界面白屏
    }
}

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const message = input.value.trim();
        
        if (!message) return;

        // 1. 在 UI 上显示用户消息
        appendMessage('user', message);
        input.value = '';

        // 2. 创建 AI 回复框
        const aiDiv = appendMessage('assistant', '');
        const contentSpan = aiDiv.querySelector('span');

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: message, 
                    user_id: currentUserId, // 👈 确保这里有值
                    lang: currentLang 
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                fullText += decoder.decode(value, { stream: true });
                contentSpan.innerHTML = formatMarkdown(fullText);
                container.scrollTop = container.scrollHeight;
            }
        } catch (error) {
            contentSpan.innerText = "Error: " + error;
        }
    }

    function appendMessage(role, text) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `msg ${role}-msg`;
        const label = role === 'user' ? (currentLang === 'zh' ? '您' : 'You') : 'AI';
        div.innerHTML = `<b>${label}</b><span>${formatMarkdown(text)}</span>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        return div;
    }

    // --- 4. 辅助函数 ---
    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('vino_lang', currentLang);
        updateUI();
    }

   async function handleLogin() {
    const user = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;
    if (!user || !pass) return;

    try {
        const res = await fetch('/login', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({username:user, password:pass}) 
        });
        const data = await res.json();
        if (res.ok) {
            currentUserId = data.user_id;
            global_ct_pass = pass;
            document.getElementById('user-id').value = currentUserId;
            // 👈 核心：隐藏登录遮罩并更新一次 UI
            document.getElementById('login-overlay').style.display = 'none';
            updateUI(); 
            syncCellar();
        } else {
            const errEl = document.getElementById('login-err-msg');
            errEl.style.display = 'block';
            errEl.innerText = i18n[currentLang].login_err;
        }
    } catch (e) { console.error(e); }
}

// --- 5. 同步逻辑 ---

async function syncCellar() {
    const syncBtn = document.getElementById('sync-btn');
    const t = i18n[currentLang];
    
    // 1. 视觉反馈：禁用按钮并显示“同步中...”
    syncBtn.disabled = true;
    syncBtn.innerText = t.syncing;

    try {
        const res = await fetch('/update_cellar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                user_id: currentUserId,
                ct_pass: global_ct_pass 
            })
        });
        const data = await res.json();
        
        if (res.ok) {
            // 2. 成功后在聊天框提示用户
            const successMsg = currentLang === 'zh' 
                ? `✅ 同步成功！已加载 ${data.count} 瓶藏酒。` 
                : `✅ Sync successful! Loaded ${data.count} bottles.`;
            appendMessage('assistant', successMsg);
        } else {
            console.error("同步失败:", data.error);
        }
    } catch (e) {
        console.error("网络错误:", e);
    } finally {
        // 3. 无论成功失败，恢复按钮状态
        syncBtn.disabled = false;
        syncBtn.innerText = t.sync;
    }
}
    // 在 index.html 的 <script> 标签中添加
document.getElementById('user-input').addEventListener('keydown', function(e) {
    // 1. 检查是否按下了回车键 (Enter)
    if (e.key === 'Enter') {
        // 2. 💡 HCI 细节：如果用户按住 Shift + Enter，通常是为了换行，不触发发送
        if (!e.shiftKey) {
            e.preventDefault(); // 防止回车键在输入框中产生换行
            sendMessage();      // 调用你已有的发送函数
        }
    }
});
    updateUI(); // 初始化加载
</script>
</body>
</html>
