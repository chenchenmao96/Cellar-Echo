<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CellarEcho - AI Sommelier</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-blue: #0b57d0;
            --bg-main: #ffffff;
            --sidebar-bg: #f0f4f9;
            --text-main: #1f1f1f;
            --text-sub: #444746;
            --border: #c4c7c5;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
            overflow: hidden;
        }

        /* --- 登录与基础布局 --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .login-card { background: white; padding: 40px; border-radius: 28px; border: 1px solid var(--border); width: 340px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .login-card input { width: 100%; padding: 14px; border-radius: 24px; border: 1px solid var(--border); margin-bottom: 12px; box-sizing: border-box; }
        .login-btn { background: var(--primary-blue); color: white; width: 100%; padding: 14px; border-radius: 24px; border: none; cursor: pointer; font-weight: 500; }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--sidebar-bg); padding-bottom: 10px; }
        #chat-container { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }

        /* --- 消息气泡 --- */
        .msg { margin-bottom: 20px; padding: 12px 18px; border-radius: 20px; max-width: 85%; line-height: 1.6; }
        .user-msg { background: var(--sidebar-bg); color: var(--text-main); align-self: flex-end; }
        .ai-msg { background: transparent; align-self: flex-start; border: 1px solid transparent; padding-left: 0; }
        .ai-msg b { color: var(--primary-blue); display: block; margin-bottom: 4px; font-size: 0.9em; }

        /* --- Gemini 呼吸灯特效 --- */
        .thinking-container { display: flex; align-items: center; color: var(--text-sub); }
        .breathing-dot {
            width: 8px; height: 8px; background-color: var(--primary-blue);
            border-radius: 50%; margin-right: 6px;
            animation: breathing 1.5s ease-in-out infinite;
        }
        .dot-2 { animation-delay: 0.2s; }
        .dot-3 { animation-delay: 0.4s; }
        @keyframes breathing {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* --- 输入框 --- */
        .input-area { display: flex; gap: 10px; background: var(--sidebar-bg); padding: 10px 20px; border-radius: 32px; align-items: center; margin-top: 10px; }
        #user-input { flex: 1; background: transparent; border: none; outline: none; font-size: 1rem; }
        
        /* Markdown 表格美化 */
        table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.9em; }
        th, td { border: 1px solid var(--border); padding: 8px; text-align: left; }
        th { background: var(--sidebar-bg); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>🍷 CellarEcho</h2>
            <input type="text" id="login-user" placeholder="用户名">
            <input type="password" id="login-pass" placeholder="密码">
            <button onclick="handleLogin()" class="login-btn">登录</button>
            <p id="login-err-msg" style="color:red; font-size:0.8rem; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div class="header">
        <h1 style="color:var(--primary-blue); font-size:1.2rem;">CellarEcho</h1>
        <div>
            <span id="display-user" style="font-size:0.8rem; color:#888;"></span>
            <button id="sync-btn" onclick="syncCellar()" style="background:none; border:1px solid var(--primary-blue); color:var(--primary-blue); border-radius:15px; padding:2px 10px; cursor:pointer;">🔄 同步</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#888; cursor:pointer;">登出</button>
        </div>
    </div>

    <div id="chat-container">
        <div class="msg ai-msg"><b>AI</b><span>你好，我是您的 AI 侍酒师。今天想喝哪瓶藏酒？</span></div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" style="background:var(--primary-blue); color:white; border:none; padding:8px 16px; border-radius:20px; cursor:pointer;">发送</button>
    </div>

<script>
    let currentUserId = "Guest";
    let global_ct_pass = "";

    async function handleLogin() {
        const user = document.getElementById('login-user').value;
        const pass = document.getElementById('login-pass').value;
        const res = await fetch('/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username:user, password:pass}) });
        const data = await res.json();
        if (res.ok) {
            currentUserId = data.user_id;
            global_ct_pass = pass;
            document.getElementById('display-user').innerText = currentUserId;
            document.getElementById('login-overlay').style.display = 'none';
            syncCellar();
        } else {
            document.getElementById('login-err-msg').style.display = 'block';
            document.getElementById('login-err-msg').innerText = "登录失败，请检查账号密码";
        }
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const container = document.getElementById('chat-container');
        const message = input.value.trim();
        if (!message) return;

        // 1. 用户消息
        const userDiv = document.createElement('div');
        userDiv.className = 'msg user-msg';
        userDiv.innerText = message;
        container.appendChild(userDiv);
        input.value = '';
        container.scrollTop = container.scrollHeight;

        // 2. 插入 Gemini 呼吸灯占位符
        const loadingId = 'loading-' + Date.now();
        const loadingDiv = document.createElement('div');
        loadingDiv.id = loadingId;
        loadingDiv.className = 'msg ai-msg';
        loadingDiv.innerHTML = `
            <b>AI</b>
            <div class="thinking-container">
                <div class="breathing-dot"></div>
                <div class="breathing-dot dot-2"></div>
                <div class="breathing-dot dot-3"></div>
                <span style="font-size:0.85rem; margin-left:8px;">CellarEcho 正在思考...</span>
            </div>`;
        container.appendChild(loadingDiv);
        container.scrollTop = container.scrollHeight;

        try {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, user_id: currentUserId })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let isFirstChunk = true;
            let fullText = "";
            let aiTextSpan = null;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value, { stream: true });

                // 3. 收到首个非空字符：移除动画，替换为正式文本框
                if (isFirstChunk && chunk.trim().length > 0) {
                    loadingDiv.remove(); // 移除小圆点
                    
                    const finalAiDiv = document.createElement('div');
                    finalAiDiv.className = 'msg ai-msg';
                    finalAiDiv.innerHTML = `<b>AI</b><span></span>`;
                    container.appendChild(finalAiDiv);
                    aiTextSpan = finalAiDiv.querySelector('span');
                    
                    isFirstChunk = false;
                }

                if (aiTextSpan) {
                    fullText += chunk;
                    aiTextSpan.innerHTML = marked.parse(fullText);
                    container.scrollTop = container.scrollHeight;
                }
            }
        } catch (error) {
            loadingDiv.innerText = "Error: " + error;
        }
    }

    async function syncCellar() {
        const btn = document.getElementById('sync-btn');
        btn.innerText = "⌛ 同步中...";
        const res = await fetch('/update_cellar', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({user_id: currentUserId, ct_pass: global_ct_pass}) });
        if (res.ok) btn.innerText = "✅ 已同步";
        else btn.innerText = "❌ 同步失败";
    }
</script>
</body>
</html>
