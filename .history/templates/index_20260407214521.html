<!DOCTYPE html>
<html lang="zh">
<head >
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>CellarEcho - AI Sommelier</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* --- 1. Gemini Light 核心配色变量 --- */
        /* --- 全局布局重构 --- */
:root {
    /* 之前的变量保持不变 */
    --primary-blue: #0b57d0;
    --bg-main: #ffffff;
    --sidebar-bg: #f0f4f9;
    --text-main: #1f1f1f;
    --text-sub: #444746;
    --border: #c4c7c5;
}

* { box-sizing: border-box; } /* 确保所有边距不撑开容器 */

body {
    font-family: 'Google Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    margin: 0 auto;
    /* 关键：使用 dvh (Dynamic Viewport Height) 自动避开工具栏 */
    height: 100dvh; 
    display: flex;
    flex-direction: column;
    overflow: hidden; /* 防止整体滚动，只让聊天区滚动 */
    /* 适配刘海屏和底部手势条 */
    padding: 0 env(safe-area-inset-right) 0 env(safe-area-inset-left);
}

        /* --- 2. 登录遮罩层 (Gemini Light 风格) --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }

        .login-card {
            background: var(--bg-main);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid var(--border);
            text-align: center;
            width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .login-card input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 18px;
            border-radius: 24px;
            margin-bottom: 16px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .login-card input:focus { border-color: var(--primary-blue); outline: none; }

        .login-btn {
            background: var(--primary-blue);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 24px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            font-size: 1rem;
        }

        /* --- 3. 主界面布局 --- */
        .header {
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    padding: 12px 0; /* 左右 padding 交给 body 或容器 */
    margin-bottom: 15px;
    border-bottom: 1px solid var(--sidebar-bg);
    /* 新增：让顶栏也与聊天区保持相同的宽度和居中对齐 */
    width: 100%;
    max-width: 850px;
    margin-left: auto;
    margin-right: auto;
}
        #ui-title { font-size: 1.4rem; font-weight: 500; color: var(--primary-blue); }

/* --- 移除滚动条，保持功能 --- */
#chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 850px; 
    margin: 0 auto;
    
    /* 👈 隐藏滚动条 (Firefox & IE) */
    scrollbar-width: none; 
    -ms-overflow-style: none; 
}
/* 👈 隐藏滚动条 (Chrome, Safari, Opera) */
#chat-container::-webkit-scrollbar {
    display: none;
}        

      /* --- 用户消息重构 --- */
.user-msg {
    background: var(--sidebar-bg);
    color: var(--text-main);
    margin-left: auto;
    /* 👈 消除钝角：上左、上右、下左保持圆润，下右(BR)设为 4px 实现“锚定”感 */
    border-radius: 18px 18px 4px 18px; 
    padding: 12px 18px;
    max-width: 80%; /* 稍微收窄，增加呼吸感 */
    box-shadow: 0 1px 2px rgba(0,0,0,0.05); /* 极轻微阴影增加层次 */
}
        
        /* --- AI 消息重构 (Gemini 风格) --- */
.ai-msg, .assistant-msg {
    background: transparent;
    margin-right: auto;
    padding: 0 !important;
    /* 👈 填满宽度：取消 85% 的限制 */
    max-width: 100% !important; 
    width: 100%;
    margin-bottom: 32px; /* 增加消息间的纵向间距 */
}

.ai-msg span, .assistant-msg span {
    line-height: 1.6; /* 优化行间距，提升专业阅读体验 */
    display: block;
    width: 100%;
}
       /* 修改后：确保结果出来后 AI 标签依然是标志性的蓝色 */
        .ai-msg b, .assistant-msg b { color: var(--primary-blue); }

        .msg b { display: block; margin-bottom: 4px; font-size: 0.8em; letter-spacing: 0.5px; }
        .user-msg b { color: var(--text-sub); }
       
        /* --- 4. 底部输入框 --- */
        /* --- 底部输入区：解决遮挡与悬浮感 --- */
.input-area-wrapper {
    width: 100%;
    background: var(--bg-main);
    border-top: 1px solid rgba(0,0,0,0.05);
    /* 关键：动态计算底部间距，避开 iPhone/iPad 的 Home 条 */
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 15px)) 16px;
}

.input-area {
    display: flex;
    gap: 10px;
    background: var(--sidebar-bg);
    padding: 8px 16px;
    border-radius: 28px;
    align-items: center;
    max-width: 800px; /* iPad 优化：输入框不横跨整个屏幕 */
    margin: 0 auto;
    transition: all 0.2s;
}

.input-area:focus-within {
    background: white;
    box-shadow: 0 0 0 2px var(--primary-blue);
}
     #user-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-main);
    outline: none;
    font-size: 16px; /* 关键：移动端字号不小于16px可防止 iOS 自动缩放 */
    padding: 8px 0;
}

/* 消息气泡微调 */
/* 统一消息基础样式 */
.msg {
    margin-bottom: 24px;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
}  
        button.icon-btn {
            background: transparent; border: none; color: var(--text-sub);
            cursor: pointer; padding: 8px; border-radius: 50%;
        }
        button.icon-btn:hover { background: var(--sidebar-bg); }

        /* --- index.html 的 <style> 标签内，末尾处插入 --- */

/* 8. Markdown 渲染美化 (配合 marked.js) */
/* 针对 AI 内部的表格和 Markdown 进行全宽适配 */
/* --- 8. Markdown 渲染美化：完全还原 Gemini 风格 --- */


#chat-container blockquote { 
    border-left: 4px solid var(--primary-blue); /* 引用框左侧蓝条 */
    padding: 2px 15px; 
    color: var(--text-sub); 
    margin: 15px 0;
    background: var(--sidebar-bg);
    border-radius: 4px;
}

#chat-container ul, #chat-container ol {
    padding-left: 25px;
    margin: 10px 0;
}

/* --- 呼吸灯特效 --- */
.thinking-container { 
    display: flex; 
    align-items: center; 
    padding: 10px 0; 
    color: var(--text-sub); 
}

.breathing-dot { 
    width: 8px; 
    height: 8px; 
    background-color: var(--primary-blue); 
    border-radius: 50%; 
    margin-right: 5px; 
    animation: breathing 1.5s ease-in-out infinite; 
}

.dot-2 { animation-delay: 0.2s; }
.dot-3 { animation-delay: 0.4s; }

@keyframes breathing { 
    0%, 100% { transform: scale(1); opacity: 0.3; } 
    50% { transform: scale(1.3); opacity: 1; } 
}
/* 搜索归属页脚样式 */
.search-tip {
    margin-top: 15px;
    padding-top: 8px;
    border-top: 1px solid #eee; /* 极细的分隔线 */
    font-size: 0.8rem;
    color: #999; /* 浅灰色，视觉权重较低 */
    display: flex;
    align-items: center;
    gap: 5px;
}

.search-tip img {
    filter: grayscale(100%); /* 图标置灰，保持界面简洁 */
    opacity: 0.6;
}
/* 保护移动端表格不撑破页面 */
#chat-container span {
    word-break: break-word; /* 防止长单词撑破 */
}


/* 👈 针对手机和平板：让滚动条在滑动时自动显示，平时不占空间 */
@media (max-width: 1024px) {
    .table-wrapper {
        scrollbar-width: thin; /* 给安卓/PC 触屏一个极细指示 */
    }
    .table-wrapper::-webkit-scrollbar {
        display: block;
        height: 3px;
    }
    .table-wrapper::-webkit-scrollbar-thumb {
        background-color: rgba(0,0,0,0.1); /* 极其透明的指示条 */
    }
}


/* --- 8. 极致 Gemini 简约表格：无竖线 + 智能隐形滚动条 --- */
.table-wrapper {
    width: 100%;
    margin: 16px 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    /* Firefox 隐藏方案 */
    scrollbar-width: none; 
}

/* 👈 关键修复：不要用 display: none，改用颜色透明 */
.table-wrapper::-webkit-scrollbar {
    height: 5px; /* 始终定义高度，确保它存在 */
}

.table-wrapper::-webkit-scrollbar-track {
    background: transparent; /* 轨道始终透明 */
}

.table-wrapper::-webkit-scrollbar-thumb {
    background: transparent; /* 👈 默认状态下：滑块也是透明的，所以看不见 */
    border-radius: 10px;
    transition: background 0.3s ease; /* 增加平滑过渡感 */
}

/* 👈 关键修复：Hover 时才给滑块上色 */
.table-wrapper:hover::-webkit-scrollbar-thumb {
    background: #dadce0; /* 鼠标移上去，淡灰色滑块显现 */
}

/* 针对 Firefox 的 Hover 适配 */
.table-wrapper:hover {
    scrollbar-width: thin;
    scrollbar-color: #dadce0 transparent;
}

#chat-container table {
    display: table;
    width: 100%;
    border-collapse: collapse;
    font-size: 0.95rem;
    white-space: nowrap; /* 确保内容不折行，从而触发溢出滚动 */
}

#chat-container th {
    border-bottom: 1px solid #e8eaed; 
    padding: 16px 12px;
    text-align: left;
    font-weight: 500;
    color: var(--text-main);
}

#chat-container td {
    border-bottom: 1px solid #f1f3f4;
    padding: 18px 12px;
    color: var(--text-main);
    vertical-align: top;
}

#chat-container td:first-child {
    font-weight: 500;
    color: #000;
    width: 30%; 
    min-width: 120px;
}

#chat-container tr:last-child td {
    border-bottom: none;
}

    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2 id="login-title">🍷 CellarEcho</h2>
            <p id="login-sub">登录以开启酒窖对话</p>
            <input type="text" id="login-user" placeholder="用户名">
            <div style="position: relative;">
                <input type="password" id="login-pass" placeholder="密码">
                <span onclick="togglePassword()" style="position:absolute; right:18px; top:14px; cursor:pointer; color:var(--primary-blue);">👁️</span>
            </div>
            <button onclick="handleLogin()" class="login-btn">登录</button>
            <div style="margin-top:24px;">
                <button id="login-lang-btn" onclick="toggleLang()" style="background:transparent; color:var(--primary-blue); border:none; text-decoration:underline; cursor:pointer; font-size:0.9rem;">English</button>
            </div>
            <p id="login-err-msg" style="color:var(--error); font-size:0.85rem; margin-top:15px; display:none;"></p>
        </div>
    </div>

    <div class="header">
        <h1 id="ui-title">CellarEcho</h1>
        <div class="controls">
            <input type="text" id="user-id" readonly style="width:70px; background:var(--sidebar-bg); border:none; color:var(--text-sub); border-radius:12px; text-align:center; font-size:0.75rem; padding:4px;">
            <button id="sync-btn" onclick="syncCellar()" style="color:var(--primary-blue); border-color:var(--primary-blue); font-size:0.85rem;">🔄 同步</button>
            <button id="logout-btn" onclick="location.reload()" style="font-size:0.85rem;">登出</button>
            <button id="lang-btn" onclick="toggleLang()" style="font-size:0.85rem;">EN</button>
        </div>
    </div>

    <div id="chat-container">
        <div class="msg ai-msg" id="welcome-msg">你好，陈陈。我是您的 AI 侍酒师。</div>
    </div>

    <div class="input-area-wrapper">
        <div class="input-area">
            <input type="text" id="user-input" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="send-btn" onclick="sendMessage()" style="background:var(--primary-blue); color:white; border:none; padding:8px 18px; border-radius:20px; font-weight:500;">发送</button>
        </div>
    </div>

<script>
    // --- 1. 全局配置 ---
    const i18n = {
    zh: { 
        title: "CellarEcho", 
        welcome: "你好。我是您的 AI 侍酒师。今天想喝哪瓶藏酒？", 
        sync: "🔄 同步", 
        syncing: "⌛ 同步中...", 
        lang_label: "English", 
        placeholder: "问问 AI 今晚喝哪瓶...", 
        logout: "登出",
        send: "发送",
        login_title: "🍷 CellarEcho",
        login_sub: "登录以开启酒窖对话",
        login_user: "用户名",
        login_pass: "密码",
        login_btn: "登录",
        login_err: "账号或密码错误" ,
        thinking: "CellarEcho 正在思考..."
    },
    en: { 
        title: "CellarEcho", 
        welcome: "Hello. I'm your AI Sommelier. Which bottle shall we open today?", 
        sync: "🔄 Sync", 
        syncing: "⌛ Syncing...", 
        lang_label: "中文", 
        placeholder: "Ask AI about your wine...", 
        logout: "Logout",
        send: "Send",
        login_title: "🍷 CellarEcho",
        login_sub: "Login to chat with your cellar",
        login_user: "Username",
        login_pass: "Password",
        login_btn: "Login",
        login_err: "Incorrect credentials" ,
        thinking: "CellarEcho is thinking..."
    }
};
    let currentLang = localStorage.getItem('vino_lang') || 'zh';
    let currentUserId = "Guest"; // 👈 默认值，防止 ReferenceError
    let global_ct_pass = "";
    let isThinking = false; // 👈 记录 AI 是否正在思考的状态
    // --- 2. 界面更新函数 ---
    function updateUI() {
    const t = i18n[currentLang];
    
    // 1. 更新主界面文字
    document.getElementById('ui-title').innerText = t.title;
    document.getElementById('sync-btn').innerText = t.sync;
    document.getElementById('user-input').placeholder = t.placeholder;
    document.getElementById('lang-btn').innerText = currentLang === 'zh' ? "EN" : "中文";
    
    // 2. 更新“登出”和“发送”按钮
    const logoutBtn = document.getElementById('logout-btn');
    if (logoutBtn) logoutBtn.innerText = t.logout;
    
    const sendBtn = document.getElementById('send-btn');
    if (sendBtn) sendBtn.innerText = t.send;

    // 3. 👈 核心修复：更新登录界面的所有组件
    const loginTitle = document.getElementById('login-title');
    if (loginTitle) loginTitle.innerText = t.login_title;

    const loginSub = document.getElementById('login-sub');
    if (loginSub) loginSub.innerText = t.login_sub;

    const loginUser = document.getElementById('login-user');
    if (loginUser) loginUser.placeholder = t.login_user;

    const loginPass = document.getElementById('login-pass');
    if (loginPass) loginPass.placeholder = t.login_pass;

    const loginBtn = document.querySelector('.login-btn'); // 👈 注意类名选择器
    if (loginBtn) loginBtn.innerText = t.login_btn;

    // 4. 更新语言切换按钮（显示目标语言）
    const loginLangBtn = document.getElementById('login-lang-btn');
    if (loginLangBtn) loginLangBtn.innerText = t.lang_label;

    // 5. 更新欢迎语
    if(document.getElementById('chat-container').children.length <= 1) {
        document.getElementById('welcome-msg').innerText = t.welcome;
    }
}

    function formatMarkdown(text) {
    if (!text) return "";
    try {
        let html = marked.parse(text);
        // 👈 核心逻辑：给所有的 <table> 标签套上一层 wrapper，实现优雅的移动端横滑
        return html.replace(/<table>/g, '<div class="table-wrapper"><table>').replace(/<\/table>/g, '</table></div>');
    } catch (e) {
        console.error("Markdown 解析出错:", e);
        return text;
    }
}

async function sendMessage() {
    const input = document.getElementById('user-input');
    const container = document.getElementById('chat-container');
    const message = input.value.trim();
    const sendBtn = document.getElementById('send-btn'); // 👈 核心修复：添加这一行！
    if (!message) return;
    // --- 1. 进入“思考状态” ---
    isThinking = true;
    sendBtn.disabled = true; // 禁用按钮
    sendBtn.style.opacity = "0.5"; // 视觉上变淡
    sendBtn.style.cursor = "not-allowed";
    // 1. 显示用户消息
    appendMessage('user', message);
    input.value = '';

    // 2. 创建并显示“呼吸灯”加载状态
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'msg ai-msg';
    const thinkingText = i18n[currentLang].thinking;
    loadingDiv.innerHTML = `
        <b>AI</b>
        <div class="thinking-container">
            <div class="breathing-dot"></div>
            <div class="breathing-dot dot-2"></div>
            <div class="breathing-dot dot-3"></div>
            <span style="font-size:0.9em; margin-left:10px;">${thinkingText}</span>
        </div>`;
    container.appendChild(loadingDiv);
    container.scrollTop = container.scrollHeight;

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                message: message, 
                user_id: currentUserId, 
                lang: currentLang 
            })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let isFirstChunk = true;
        let fullText = "";
        let contentSpan = null;
        let aiMsgDiv = null; // 👈 核心修复 1：在这里定义变量，让整个循环都能访问到它

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            const chunk = decoder.decode(value, { stream: true });

            // 3. 拦截后端发来的“搜索使用”信号
            if (chunk.includes("__GOOGLE_SEARCH_USED__")) {
                const tipText = currentLang === 'zh' ? '来自 Google 搜索的实时校准' : 'Verified by Google Search';
                const tipHtml = `
                    <div class="search-tip">
                        <img src="https://www.google.com/favicon.ico" width="12" height="12">
                        <i>${tipText}</i>
                    </div>`;
                
                // 👈 核心修复 2：现在 aiMsgDiv 在这里是有效的了
                if (aiMsgDiv) {
                    aiMsgDiv.insertAdjacentHTML('beforeend', tipHtml);
                }
                continue; 
            }

            // 4. 收到第一个有效字符时，移除呼吸灯，创建正式消息框
            if (isFirstChunk && chunk.trim().length > 0) {
                loadingDiv.remove(); 
                aiMsgDiv = appendMessage('assistant', ''); // 👈 核心修复 3：赋值给 aiMsgDiv
                contentSpan = aiMsgDiv.querySelector('span');
                isFirstChunk = false;
            }

            if (contentSpan) {
                fullText += chunk;
                contentSpan.innerHTML = formatMarkdown(fullText);
                container.scrollTop = container.scrollHeight;
            }
        }
    } catch (error) {
        loadingDiv.innerHTML = `<b>AI</b><span>Error: ${error}</span>`;
    }finally {
        isThinking = false;
        sendBtn.disabled = false; 
        sendBtn.style.opacity = "1"; 
        sendBtn.style.cursor = "pointer";
        
        // 如果不是移动端（屏幕宽度 > 768px），才自动聚焦
        if (window.innerWidth > 768) {
            input.focus();
        } else {
            input.blur(); // 移动端发送后收起键盘，方便看回复
        }
    }
}
function appendMessage(role, text) {
    const container = document.getElementById('chat-container');
    const div = document.createElement('div');
    
    // 👈 核心修改：将 assistant 角色也映射到 ai-msg
    const roleClass = (role === 'user') ? 'user-msg' : 'ai-msg';
    div.className = `msg ${roleClass}`;
    
    const label = role === 'user' ? (currentLang === 'zh' ? '您' : 'You') : 'AI';
    div.innerHTML = `<b>${label}</b><span>${formatMarkdown(text)}</span>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

    // --- 4. 辅助函数 ---
    function toggleLang() {
        currentLang = currentLang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('vino_lang', currentLang);
        updateUI();
    }
    // 添加这个函数来切换密码可见性
    function togglePassword() {
        const passInput = document.getElementById('login-pass');
        // 如果当前是密码模式，就换成文本模式；反之亦然
        if (passInput.type === 'password') {
            passInput.type = 'text';
        } else {
            passInput.type = 'password';
        }
    }
   async function handleLogin() {
    const user = document.getElementById('login-user').value;
    const pass = document.getElementById('login-pass').value;
    if (!user || !pass) return;

    try {
        const res = await fetch('/login', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({username:user, password:pass}) 
        });
        const data = await res.json();
        if (res.ok) {
            currentUserId = data.user_id;
            global_ct_pass = pass;
            document.getElementById('user-id').value = currentUserId;
            // 👈 核心：隐藏登录遮罩并更新一次 UI
            document.getElementById('login-overlay').style.display = 'none';
            updateUI(); 
            syncCellar();
            document.getElementById('user-input').focus();
        } else {
            const errEl = document.getElementById('login-err-msg');
            errEl.style.display = 'block';
            errEl.innerText = i18n[currentLang].login_err;
        }
    } catch (e) { console.error(e); }
}

// --- 5. 同步逻辑 ---

async function syncCellar() {
    const syncBtn = document.getElementById('sync-btn');
    const t = i18n[currentLang];
    
    // 1. 视觉反馈：禁用按钮并显示“同步中...”
    syncBtn.disabled = true;
    syncBtn.innerText = t.syncing;

    try {
        const res = await fetch('/update_cellar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                user_id: currentUserId,
                ct_pass: global_ct_pass 
            })
        });
        const data = await res.json();
        
        if (res.ok) {
            // 2. 成功后在聊天框提示用户
            const successMsg = currentLang === 'zh' 
                ? `✅ 同步成功！已加载 ${data.count} 瓶藏酒。` 
                : `✅ Sync successful! Loaded ${data.count} bottles.`;
            appendMessage('assistant', successMsg);
        } else {
            console.error("同步失败:", data.error);
        }
    } catch (e) {
        console.error("网络错误:", e);
    } finally {
        // 3. 无论成功失败，恢复按钮状态
        syncBtn.disabled = false;
        syncBtn.innerText = t.sync;
    }
}
    // 在 index.html 的 <script> 标签中添加
document.getElementById('user-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        // 💡 只有当 AI 不在思考 ( !isThinking ) 时才触发发送
        if (!e.shiftKey && !isThinking) {
            e.preventDefault();
            sendMessage();
        } else if (isThinking) {
            // 如果正在思考，阻止回车的默认换行行为，防止输入框乱跳
            e.preventDefault(); 
        }
    }
});

async function loadChatHistory(userId) {
    const response = await fetch(`/get_history?user_id=${userId}`);
    const data = await response.json();
    
    if (data.status === "success") {
        const chatContainer = document.getElementById('chat-container'); // 你的聊天框 ID
        chatContainer.innerHTML = ''; // 清空加载动画
        
        data.history.forEach(msg => {
            // 根据 role 是 'user' 还是 'assistant' 渲染不同的样式
            appendMessageToUI(msg.role, msg.content); 
        });
    }
}

// 建议：在用户登录成功后立即调用此函数
loadChatHistory(currentUserId);
    updateUI(); // 初始化加载
</script>
