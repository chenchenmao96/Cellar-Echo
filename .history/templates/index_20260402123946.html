<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CellarEcho - AI Sommelier</title>
    <style>
        :root {
            --burgundy: #800020;
            --gold: #D4AF37;
            --dark-bg: #1a1a1a;
            --chat-bg: #252525;
            --text: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text);
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        /* 顶部控制栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--burgundy);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        input[type="text"] {
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
        }

        button {
            cursor: pointer;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            transition: all 0.3s;
            font-weight: bold;
        }

        #sync-btn { background-color: var(--burgundy); color: white; }
        #sync-btn:hover { background-color: #a00028; }
        #sync-btn:disabled { background-color: #444; cursor: not-allowed; }

        #lang-btn { background-color: #444; color: white; }

        /* 聊天区域 */
        #chat-container {
            flex: 1;
            background: var(--chat-bg);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .msg { margin-bottom: 15px; line-height: 1.5; padding: 10px; border-radius: 6px; max-width: 85%; }
        .user-msg { background: #3a3a3a; margin-left: auto; border-right: 4px solid var(--gold); }
        .ai-msg { background: #2d2d2d; margin-right: auto; border-left: 4px solid var(--burgundy); }

        /* 输入区域 */
        .input-area {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex: 1;
            padding: 12px;
            background: #333;
            border: 1px solid var(--burgundy);
            color: white;
            border-radius: 4px;
        }

        #send-btn { background-color: var(--gold); color: black; width: 100px; }
        #send-btn:hover { background-color: #f1c40f; }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: var(--burgundy); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="ui-title">🍷 CellarEcho</h1>
        <div class="controls">
            <input type="text" id="user-id" value="Chenchen" title="User ID">
            <button id="sync-btn" onclick="syncCellar()">🔄 同步酒窖</button>
            <button id="lang-btn" onclick="toggleLang()">English</button>
        </div>
    </div>

    <div id="chat-container">
        <div class="msg ai-msg" id="welcome-msg">
            你好，陈陈。我是你的 AI 侍酒师。今天想喝哪瓶藏酒？
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        // --- 多语言配置 ---
        const i18n = {
            zh: {
                title: "🍷 CellarEcho 侍酒师",
                sync: "🔄 同步酒窖",
                syncing: "⌛ 同步中...",
                sync_ok: "同步成功！已载入 {n} 瓶酒。",
                sync_err: "同步失败，请检查后端日志。",
                placeholder: "问问 AI 今晚喝哪瓶...",
                send: "发送",
                welcome: "你好。我是你的 AI 侍酒师。今天想喝哪瓶藏酒？",
                lang_label: "English"
            },
            en: {
                title: "🍷 CellarEcho Sommelier",
                sync: "🔄 Sync Cellar",
                syncing: "⌛ Syncing...",
                sync_ok: "Success! Loaded {n} bottles.",
                sync_err: "Sync failed. Check logs.",
                placeholder: "Ask AI which bottle to drink...",
                send: "Send",
                welcome: "Hello. I'm your AI Sommelier. Which bottle shall we open today?",
                lang_label: "中文"
            }
        };

        let currentLang = localStorage.getItem('vino_lang') || 'zh';

        // --- 初始化界面 ---
        function updateUI() {
            const t = i18n[currentLang];
            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('sync-btn').innerText = t.sync;
            document.getElementById('user-input').placeholder = t.placeholder;
            document.getElementById('send-btn').innerText = t.send;
            document.getElementById('lang-btn').innerText = t.lang_label;
            // 只有初始状态才更新欢迎语
            if(document.getElementById('chat-container').children.length === 1) {
                document.getElementById('welcome-msg').innerText = t.welcome;
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('vino_lang', currentLang);
            updateUI();
        }

        // --- 核心功能：同步酒窖 ---
        async function syncCellar() {
            const btn = document.getElementById('sync-btn');
            const userId = document.getElementById('user-id').value;
            const t = i18n[currentLang];

            btn.disabled = true;
            btn.innerText = t.syncing;

            try {
                const response = await fetch('/update_cellar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert(t.sync_ok.replace('{n}', data.count));
                } else {
                    alert(t.sync_err);
                }
            } catch (error) {
                alert(t.sync_err);
            } finally {
                btn.disabled = false;
                btn.innerText = t.sync;
            }
        }

        // --- 核心功能：聊天对话 ---
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const userId = document.getElementById('user-id').value;
            const message = input.value.trim();

            if (!message) return;

            // 1. 用户消息上屏
            appendMessage('user', message);
            input.value = '';

            try {
                // 2. 发送到后端（带上语言偏好）
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message, 
                        user_id: userId,
                        lang: currentLang 
                    })
                });
                const data = await response.json();
                
                // 3. AI 回复上屏
                appendMessage('ai', data.reply);
            } catch (error) {
                appendMessage('ai', "Error: 无法连接到侍酒师。");
            }
        }

        function appendMessage(role, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `msg ${role}-msg`;
            // 处理 AI 返回的换行符
            div.innerHTML = `<b>${role === 'user' ? (currentLang === 'zh' ? '你' : 'You') : 'CellarEcho'}:</b><br>${text.replace(/\n/g, '<br>')}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        // 启动执行
        updateUI();
    </script>
</body>
</html>
